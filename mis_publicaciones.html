<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusAmigo | Mis publicaciones</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header></header>

    <main class="container">
        <div class="auth-head" style="margin-top:10px">
            <h1>Mis publicaciones</h1>
            <p>Vista simulada del historial de productos publicados por el usuario.</p>
        </div>

        <div class="grid" style="margin-top:18px">
            <article class="card product" style="grid-column: span 4">
                <div class="prod-media">
                    <div class="prod-fallback">Producto</div>
                </div>

                <div class="p-body" style="margin-top:10px">
                    <div class="p-tag">
                        <span class="tag new">Publicado</span>
                    </div>

                    <h3 class="p-title">Mouse inalámbrico Logitech</h3>

                    <div class="p-meta">
                        <span class="small">electronica</span>
                        <span class="price">$250.00</span>
                    </div>

                    <div style="margin-top:8px">
                        <span class="small">Usuario: Usuario Demo</span>
                    </div>

                    <hr />

                    <div class="p-actions">
                        <button class="btn">Editar</button>
                        <button class="btn danger outline">Eliminar</button>
                    </div>
                </div>
            </article>
        </div>

        <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
            <a class="btn primary" href="publicar.html">Agregar publicación</a>
            <a class="btn" href="perfil.html">Volver al perfil</a>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
