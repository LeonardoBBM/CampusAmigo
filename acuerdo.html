<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusAmigo | Acuerdo de entrega</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
    </header>

    <main class="container">
        <h1>Acordar entrega</h1>
        <p class="small">Sin chat: solo propuesta y aceptación de punto + fecha/hora.</p>

        <section class="grid" style="margin-top:14px">
            <div class="card" style="grid-column: span 7">
                <h3>Detalle del pedido</h3>
                <div id="info" class="small">—</div>
                <hr />
                <div id="state" class="notice">—</div>
            </div>

            <div class="card" style="grid-column: span 5">
                <h3>Entrega</h3>

                <label class="small">Punto</label>
                <select id="point"></select>

                <div style="height:10px"></div>

                <label class="small">Fecha y hora</label>
                <input id="dt" class="input" type="datetime-local" />

                <div style="height:14px"></div>

                <div class="row" style="gap:10px; flex-wrap:wrap">
                    <button id="propose" class="btn primary">Proponer</button>
                    <button id="accept" class="btn">Aceptar</button>
                </div>

                <div class="row" style="margin-top:10px; gap:10px; flex-wrap:wrap">
                    <button id="delivered" class="btn">Marcar entregado</button>
                    <button id="cancel" class="btn">Cancelar</button>
                </div>

                <div id="msg" class="notice" hidden style="margin-top:12px"></div>
            </div>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/marketplace.js"></script>
    <script src="js/acuerdo.js"></script>
    <script>ensureSeed(); updateCartBadge();</script>
</body>

</html>
