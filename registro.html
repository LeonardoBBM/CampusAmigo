<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusAmigo | Registro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header></header>

  <main class="container auth-wrap">
    <section class="card auth-card">
      <div class="auth-head">
        <h1>Crear cuenta</h1>
        <p>Regístrate para publicar productos/servicios y acordar entregas dentro del campus.</p>
      </div>

      <div id="msg" class="notice danger" hidden></div>

      <div class="auth-form">
        <div class="field">
          <label for="name">Nombre</label>
          <input id="name" class="input" type="text" placeholder="Ej. Leo" autocomplete="name" />
        </div>

        <div class="field">
          <label for="email">Correo</label>
          <input id="email" class="input" type="email" placeholder="alguien@tec.mx" autocomplete="email" />
        </div>

        <div class="field">
          <label for="pass">Contraseña</label>
          <input id="pass" class="input" type="password" placeholder="••••••••" autocomplete="new-password" />
        </div>

        <div class="auth-actions">
          <button id="btn" class="btn primary block" type="button">Registrarme</button>
          <div class="row">
            <span class="small">¿Ya tienes cuenta?</span>
            <a class="pill" href="login.html">Inicia sesión</a>
          </div>
        </div>
      </div>

      <div class="auth-footer">
        Al registrarte aceptas los términos… que no existen.
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
