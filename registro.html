<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CampusAmigo | Registro</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <span style="width:12px;height:12px;border-radius:4px;background:var(--accent);display:inline-block"></span>
        <a href="index.html">CampusAmigo</a>
        <span class="badge">beta</span>
      </div>

      <nav class="links">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Catálogo</a>
      </nav>

      <div class="actions">
        <a class="pill" href="carrito.html">Carrito: <b data-cart-count>0</b></a>
        <span id="nav-auth"></span>
      </div>
    </div>
  </header>

  <main class="container">
    <h1>Registro</h1>
    <p class="small">Guarda el usuario en LocalStorage.</p>

    <section class="card" style="max-width:520px">
      <label class="small">Nombre</label>
      <input id="name" class="input" placeholder="Ej. Leo" />

      <div style="height:10px"></div>

      <label class="small">Correo</label>
      <input id="email" class="input" placeholder="alguien@tec.mx" />

      <div style="height:10px"></div>

      <label class="small">Contraseña</label>
      <input id="pass" class="input" type="password" placeholder="••••••••" />

      <div style="height:14px"></div>

      <button id="btn" class="btn primary" style="width:100%">Registrarme</button>

      <div id="msg" class="notice" hidden style="margin-top:12px"></div>

      <p class="small" style="margin-top:12px">
        ¿Ya tienes cuenta? <a href="login.html"><b>Inicia sesión</b></a>
      </p>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    ensureSeed(); updateCartBadge();
  </script>
</body>
</html>
