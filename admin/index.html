<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusAmigo | Admin</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header>
  </header>

  <main class="container">
    <h1>Panel de administrador</h1>
    <div class="grid" style="margin-top:14px">
      <div class="card" style="grid-column: span 4">
        <h3>Productos</h3>
        <p class="small">Total: <b id="pcount">—</b></p>
      </div>
      <div class="card" style="grid-column: span 4">
        <h3>Pedidos</h3>
        <p class="small">Simulado: <b>5</b></p>
      </div>
      <div class="card" style="grid-column: span 4">
        <h3>Usuarios</h3>
        <p class="small">Simulado: <b>23</b></p>
      </div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="js/nav.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Candado simple de admin
    const u = currentUser();
    if (!u || u.role !== "admin") {
      alert("Acceso solo para administrador (simulado).");
      location.href = "../login.html";
    }
  </script>
  <script>
    ensureSeed();
    document.querySelector("#pcount").textContent = getProducts().length;
  </script>
</body>

</html>
