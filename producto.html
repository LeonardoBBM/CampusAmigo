<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusAmigo | Perfil</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header></header>

  <main class="container">
    <h1>Perfil</h1>

    <div id="loggedOut" class="notice danger" hidden>
      No has iniciado sesión. <a href="login.html"><b>Ir a Login</b></a>
    </div>

    <div id="loggedIn" class="grid" hidden style="margin-top:14px">
      <section class="card" style="grid-column: span 6">
        <h3>Mis datos</h3>
        <p class="small">Vista simulada.</p>
        <hr/>
        <div class="row"><span class="small">Nombre</span><b id="pName">—</b></div>
        <div class="row" style="margin-top:8px"><span class="small">Correo</span><b id="pEmail">—</b></div>
        <div class="row" style="margin-top:8px"><span class="small">Rol</span><b>Cliente</b></div>

        <div style="height:14px"></div>
        <button id="logout" class="btn">Cerrar sesión</button>
      </section>

      <section class="card" style="grid-column: span 6">
        <h3>Mis compras</h3>
        <p class="small">Próximamente.</p>
        <hr/>
        <ul class="small" style="margin:0;padding-left:18px">
          <li>Sin historial aún.</li>
        </ul>
      </section>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
  <script>
    renderProfile();
  </script>
</body>
</html>
