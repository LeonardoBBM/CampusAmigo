<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusAmigo | Carrito</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header></header>

  <main class="container">
    <h1>Carrito</h1>

    <div id="empty" class="notice" hidden>
      Tu carrito está vacío. Ve al <a href="catalogo.html"><b>catálogo</b></a>.
    </div>

    <div class="grid" style="margin-top:14px">
      <section class="card" style="grid-column: span 8">
        <table class="table">
          <thead>
            <tr>
              <th>Producto</th>
              <th class="right">Precio</th>
              <th class="right">Cantidad</th>
              <th class="right">Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>

      <aside class="card" style="grid-column: span 4">
        <h3>Resumen</h3>
        <div class="row"><span class="small">Subtotal</span><b id="sub">$0.00</b></div>
        <div class="row" style="margin-top:8px"><span class="small">Total</span><b id="tot">$0.00</b></div>
        <hr />

        <div class="checkout-actions">
          <button class="btn danger outline" id="clear" type="button">Vaciar</button>
          <button id="pay" class="btn primary" type="button">Ir a pagar</button>
        </div>

        <p class="small" style="margin-top:10px">Continúa al checkout para capturar dirección, método de pago y
          confirmar tu compra.</p>
      </aside>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/carrito.js"></script>
</body>

</html>
