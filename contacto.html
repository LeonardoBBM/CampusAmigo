<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusAmigo | Contacto</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header></header>

  <main class="container auth-wrap">
    <section class="card auth-card">
      <div class="auth-head">
        <h1>Contacto</h1>
        <p>¿Tienes dudas, sugerencias o quieres colaborar? Escríbenos.</p>
      </div>

      <div id="msg" class="notice" hidden></div>

      <div class="auth-form">
        <div class="field">
          <label for="name">Nombre</label>
          <input id="name" class="input" type="text" placeholder="Tu nombre" />
        </div>

        <div class="field">
          <label for="email">Correo</label>
          <input id="email" class="input" type="email" placeholder="tu@correo.com" />
        </div>

        <div class="field">
          <label for="message">Mensaje</label>
          <textarea id="message" class="input" rows="4" placeholder="¿En qué te ayudamos?"></textarea>
        </div>

        <button id="send" class="btn primary block" type="button">
          Enviar mensaje
        </button>
      </div>

      <hr style="margin:18px 0" />

      <div class="small" style="margin-bottom:8px">También puedes encontrarnos en:</div>

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <span class="pill">Instagram</span>
        <span class="pill">Facebook</span>
        <span class="pill">WhatsApp</span>
      </div>

    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>

  <script>
    const btn = document.querySelector("#send");
    const msg = document.querySelector("#msg");

    btn.addEventListener("click", ()=>{
      msg.hidden = false;
      msg.classList.remove("danger");
      msg.textContent = "Mensaje enviado (simulado). Gracias por contactarnos.";
      btn.textContent = "Enviado ✓";
      btn.disabled = true;
    });
  </script>

</body>
</html>
